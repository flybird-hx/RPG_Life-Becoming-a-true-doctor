<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG: Become a Doctor of Civil Engineering</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HuXiao RPG">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/pixel-art/svg?seed=DrainageDoctor">

    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0b1e;
            --card-bg: #161b33; --sidebar-bg: #11152b; --text: #e0e0e0;
            --gold: #ffd700; --success: #39ff14; --warning: #ff4757;
            --int-color: #3498db; --con-color: #e74c3c; --per-color: #2ecc71; --cha-color: #9b59b6;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0; height: 100svh; width: 100vw;
            display: flex; overflow: hidden; touch-action: manipulation;
        }

        .main-container {
            display: flex; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; gap: 25px;
            padding-top: calc(env(safe-area-inset-top) + 15px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px);
        }

        .sidebar {
            flex: 0 0 350px; background: var(--sidebar-bg); border-radius: 24px;
            padding: 20px; border: 2px solid var(--secondary);
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.25);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        .content { flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; }

        @media (max-width: 900px), (orientation: portrait) {
            body { overflow-y: auto; height: auto; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .sidebar { flex: none; width: 100%; position: relative; }
            .content { overflow-y: visible; }
        }

        .avatar-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); display: block; margin: 0 auto; }
        .player-name { font-size: 1.6rem; font-weight: bold; text-align: center; margin-top: 12px; color: var(--primary); }
        .level-badge { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; padding: 6px 16px; border-radius: 15px; font-size: 1rem; font-weight: bold; display: block; margin: 10px auto; text-align: center; width: fit-content; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 0.75rem; color: #888; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }

        .ach-card { background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .ach-label { font-size: 0.85rem; color: #aaa; }
        .ach-val { font-size: 1.3rem; font-weight: bold; color: var(--primary); }

        .reward-zone { margin-top: 18px; padding: 15px; background: rgba(57, 255, 20, 0.05); border: 1px dashed rgba(57, 255, 20, 0.4); border-radius: 15px; }
        .reward-header { font-size: 0.95rem; color: var(--success); font-weight: bold; margin-bottom: 12px; }
        .reward-item { display: flex; justify-content: space-between; align-items: center; font-size: 1rem; margin-bottom: 10px; color: #666; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.02); }
        .reward-item.unlocked { color: var(--gold); background: rgba(255,215,0,0.05); font-weight: bold; }
        .reward-count { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 10px; font-size: 0.85rem; font-weight: bold; }

        .cd-zone { margin-top: 15px; background: rgba(255, 71, 87, 0.12); border: 1px solid rgba(255, 71, 87, 0.3); border-radius: 15px; padding: 15px; text-align: center; }
        .ms-card { margin-top: 10px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 15px; padding: 15px; text-align: center; }

        .backup-zone { margin-top: auto; padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-small { background: #1a1a1a; border: 1px solid #333; color: #777; padding: 14px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; font-weight: bold; }
        .btn-export { border-color: var(--success); color: var(--success); }
        .btn-import { border-color: var(--primary); color: var(--primary); }

        .section-title { color: var(--gold); font-size: 1.4rem; margin: 25px 0 15px; border-left: 6px solid var(--gold); padding-left: 15px; font-weight: bold; }
        .task-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 18px; display: flex; align-items: center; border-left: 8px solid var(--secondary); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .task-info { flex: 1; }
        .task-name { font-weight: bold; font-size: 1.3rem; }
        .task-desc { font-size: 1rem; color: #aaa; margin-top: 8px; }
        .task-pts-display { font-size: 1.3rem; font-weight: bold; color: var(--success); margin: 0 25px; min-width: 50px; text-align: right; }
        input[type="checkbox"] { width: 42px; height: 42px; cursor: pointer; accent-color: var(--primary); }
        input[type="checkbox"]:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-submit { background: linear-gradient(45deg, var(--secondary), var(--primary)); border: none; color: white; padding: 28px; border-radius: 24px; font-size: 1.7rem; font-weight: bold; margin: 20px 0; cursor: pointer; box-shadow: 0 15px 35px rgba(112, 0, 255, 0.5); }
    </style>
</head>
<body>

<div class="main-container">
    <aside class="sidebar">
        <div class="avatar-container">
            <img src="https://s41.ax1x.com/2026/03/02/peplfNq.jpg" class="avatar-img">
            <div class="player-name">Dr. HuXiao</div>
            <div class="level-badge" id="playerLevel">LV.1 迷雾拾荒者</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-label">智力 INT</div><div class="stat-value" id="statINT">10</div></div>
            <div class="stat-box"><div class="stat-label">体质 CON</div><div class="stat-value" id="statCON">10</div></div>
            <div class="stat-box"><div class="stat-label">感知 PER</div><div class="stat-value" id="statPER">10</div></div>
            <div class="stat-box"><div class="stat-label">魅力 CHA</div><div class="stat-value" id="statCHA">10</div></div>
        </div>

        <div class="achievement-grid">
            <div class="ach-card"><span class="ach-label">累计经验</span><span id="totalXP" class="ach-val">0</span></div>
            <div class="ach-card"><span class="ach-label">当前连胜</span><span id="streak" class="ach-val">0</span></div>
        </div>

        <div class="reward-zone">
            <div class="reward-header"><span>🎁 奖励兑换清单</span></div>
            <div id="rewardList"></div>
        </div>

        <div class="cd-zone">
            <div style="font-size: 0.85rem; color: var(--warning); font-weight: bold;">毕业论文提交倒计时</div>
            <div id="thesisCountdown" style="font-size: 2.2rem; font-weight: bold; margin: 5px 0;">---</div>
            <div style="font-size: 0.65rem; color: #777;">Deadline: 2026/07/31</div>
        </div>

        <div class="ms-card">
            <div style="font-size: 0.85rem; color: var(--gold); font-weight: bold;">🏆 最高全勤纪录</div>
            <div style="font-size: 2.6rem; font-weight: bold; color: var(--gold);"><span id="maxStreak">0</span><small style="font-size: 1.2rem;"> 天</small></div>
        </div>

        <div class="backup-zone">
            <button class="btn-small btn-export" onclick="exportSave()">📤 导出备份</button>
            <button class="btn-small btn-import" onclick="importSave()">📥 导入存档</button>
        </div>
        <div style="font-size: 0.65rem; color: #555; text-align: center; margin-top: 8px;">* 跨设备同步请通过微信发送备份代码</div>
    </aside>

    <main class="content">
        <div id="todayStatus" style="text-align: right; color: #666; font-size: 1rem; margin-bottom: 10px;">系统状态：稳定</div>
        <div id="core-tasks"></div>
        <div id="side-tasks"></div>
        <button class="btn-submit" id="submitBtn" onclick="submitDay()">⚡ 提交今日战果</button>
    </main>
</div>

<script>
    const coreTasks = [
        { id: 'sci', name: '⚗️ 真理熔炉·SCI 精锻', desc: '论文深度撰写 ≥2h，或完成章节级重构', pts: 30 },
        { id: 'cfd', name: '🌀 混沌解析·数值模拟', desc: 'Fluent/VOF 建模、数据处理或湍流参数优化', pts: 20 },
        { id: 'research', name: '📜 秘典铸造·科研精进', desc: '实验研究 / 专利撰写 / 毕业论文推进等科研事项', pts: 10 }
    ];
    const sideTasks = [
        { id: 'physique', name: '🛡️ 躯体淬炼·体能强化', desc: '平板支撑 / 卷腹 / 俯卧撑 / 凯格尔 / 跑步，任选其一完成', pts: 10 },
        { id: 'read', name: '📖 智识汲取·阅读打卡', desc: '书籍精读 + 思维随笔输出', pts: 6 },
        { id: 'color', name: '🎨 视界重构·审美修炼', desc: '构图 / 色彩 / 视觉感知练习', pts: 6 },
        { id: 'review', name: '🪞 灵魂对话·自我复盘', desc: '录制复盘视频，回顾当日得失，与内心深处对话', pts: 8 }
    ];
    const rewardSettings = [
        { xp: 500, name: "半天外出放松", type: 'cycle', icon: "🌳" },
        { xp: 1400, name: "一份冰激凌/甜品", type: 'cycle', icon: "🍦" },
        { xp: 2800, name: "一顿美食奖励", type: 'cycle', icon: "🍖" },
        { xp: 5600, name: "一个手办奖励", type: 'cycle', icon: "🧩" },
        { xp: 8400, name: "1000元购物金", type: 'cycle', icon: "🧧" }
    ];

    let state = JSON.parse(localStorage.getItem('drainage_rpg_v39')) || { 
        xp: 0, streak: 0, maxStreak: 0, coins: 0, lastDate: "", missedDays: 0 
    };

    function init() {
        renderTasks(); refreshUI(); updateCountdown(); renderRewards();
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible') { refreshUI(); updateCountdown(); } });
    }

    function refreshUI() {
        document.getElementById('totalXP').innerText = state.xp;
        document.getElementById('streak').innerText = state.streak;
        document.getElementById('maxStreak').innerText = state.maxStreak || 0;
        const level = Math.floor(state.xp / 3000) + 1;
        const titles = ["迷雾拾荒者", "逻辑执旗手", "秩序炼金师", "真理守望者", "至臻·觉醒圣贤"];
        document.getElementById('playerLevel').innerText = `LV.${level} ${titles[Math.min(level-1, 4)]}`;
        ['INT', 'CON', 'PER', 'CHA'].forEach(s => { 
            document.getElementById(`stat${s}`).innerText = 10 + (level-1)*5 + Math.floor(state.streak/7)*3; 
        });
        if (state.lastDate === new Date().toDateString()) {
            document.getElementById('todayStatus').innerText = "✅ 副本锁定中";
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.style.opacity = "0.5"; btn.innerText = "今日结算已完成";
            document.querySelectorAll('input[type="checkbox"]').forEach(i => i.disabled = true);
        }
    }

    function renderRewards() {
        const list = document.getElementById('rewardList');
        list.innerHTML = rewardSettings.map(r => {
            const count = Math.floor(state.xp / r.xp);
            const isUnlocked = count > 0;
            const statusText = isUnlocked ? `<span class="reward-count">已获 ${count} 次</span>` : `<small>每 ${r.xp} XP</small>`;
            return `<div class="reward-item ${isUnlocked ? 'unlocked' : ''}"><span>${r.icon} ${r.name}</span>${statusText}</div>`;
        }).join('');
    }

    function updateCountdown() {
        const diff = new Date("2026-07-31T00:00:00") - new Date();
        const display = document.getElementById('thesisCountdown');
        if (diff > 0) display.innerText = `${Math.floor(diff / (1000*60*60*24))} 天`;
        else { display.innerText = "已到期"; display.style.color = "var(--warning)"; }
    }

    function renderTasks() {
        document.getElementById('core-tasks').innerHTML = '<div class="section-title">⚔️ 核心学术副本</div>' + coreTasks.map(t => `<div class="task-card"><div class="task-info"><b>${t.name}</b><br><small>${t.desc}</small></div><div class="task-pts-display">+${t.pts}</div><input type="checkbox" class="c-check" data-pts="${t.pts}"></div>`).join('');
        document.getElementById('side-tasks').innerHTML = '<div class="section-title">🛠️ 自我提升副本</div>' + sideTasks.map(t => `<div class="task-card" style="border-left-color:var(--primary)"><div class="task-info"><b>${t.name}</b><br><small>${t.desc}</small></div><div class="task-pts-display" style="color:var(--primary)">+${t.pts}</div><input type="checkbox" class="s-check" data-pts="${t.pts}"></div>`).join('');
    }

    function submitDay() {
        let dailyXP = 0, coreDone = true, sideCount = 0;
        document.querySelectorAll('.c-check').forEach(i => { if(i.checked) dailyXP += parseInt(i.dataset.pts); else coreDone = false; });
        document.querySelectorAll('.s-check').forEach(i => { if(i.checked) { dailyXP += parseInt(i.dataset.pts); sideCount++; } });
        if (coreDone && sideCount >= 3) {
            state.xp += dailyXP; state.streak++; state.missedDays = 0;
            if (state.streak > (state.maxStreak || 0)) state.maxStreak = state.streak;
            if(state.streak % 7 === 0) { state.coins++; alert("✨ 触发连胜神迹！复活币 +1"); }
            alert(`结算成功！增加经验：${dailyXP}`);
        } else {
            if (state.missedDays < 1) { 
                state.missedDays++; state.xp += dailyXP; alert("⚠️ 触发弹性豁免！连胜保住了。"); 
            } else if (state.coins > 0 && confirm("消耗复活币保住连胜？")) { 
                state.coins--; state.xp += dailyXP; state.missedDays = 0; 
            } else { 
                state.streak = 0; state.xp += dailyXP; state.missedDays = 0; alert("💔 连胜中断。"); 
            }
        }
        state.lastDate = new Date().toDateString();
        localStorage.setItem('drainage_rpg_v39', JSON.stringify(state));
        location.reload();
    }

    // 核心同步工具
    function exportSave() { 
        const str = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
        navigator.clipboard.writeText(str).then(() => {
            alert("📤 备份成功！\n代码已复制到剪贴板。\n请发送到微信，在另一台设备上'导入'。");
        }); 
    }
    
    function importSave() { 
        const code = prompt("请输入另一台设备的备份代码："); 
        if (code) { 
            try { 
                state = JSON.parse(decodeURIComponent(escape(atob(code)))); 
                localStorage.setItem('drainage_rpg_v39', JSON.stringify(state)); 
                location.reload(); 
            } catch (e) { alert("❌ 解析失败，请检查代码是否完整。"); } 
        } 
    }
    window.onload = init;
</script>
</body>
</html>
